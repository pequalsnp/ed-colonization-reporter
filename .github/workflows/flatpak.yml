name: flatpak

# Smoke-test that the Flathub manifest still builds from source. Runs on PRs
# that touch the packaging/build inputs and on demand. The resulting .flatpak
# is uploaded as a workflow artifact (downloadable from the run) — it is NOT
# attached to GitHub releases. The canonical distribution is Flathub, built on
# Flathub's own infra from the flathub/ca.thegalloways.edcolreport repo.

on:
  pull_request:
    paths:
      - 'packaging/flatpak/**'
      - 'packaging/ca.thegalloways.edcolreport.desktop'
      - 'packaging/ca.thegalloways.edcolreport.metainfo.xml'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/flatpak.yml'
  workflow_dispatch:

jobs:
  bundle:
    name: build flatpak bundle
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: Install golang SDK extension
        run: flatpak install -y flathub org.freedesktop.Sdk.Extension.golang//25.08

      - name: Build the checked-out tree (dir source)
        run: |
          # The committed manifest builds from a pinned git tag (the Flathub
          # form). For CI we build the working tree instead by swapping the
          # git source for a local dir source.
          sed -i '/- type: git/,/tag: v[0-9]/c\      - type: dir\n        path: ../..\n        skip: [.git, .flatpak-builder, dist, edcolreport, vendor]' \
            packaging/flatpak/ca.thegalloways.edcolreport.yaml

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: edcolreport.flatpak
          manifest-path: packaging/flatpak/ca.thegalloways.edcolreport.yaml
          cache-key: flatpak-builder-${{ github.sha }}
