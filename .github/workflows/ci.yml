name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: vet + test + build (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Fyne build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc pkg-config \
            libgl1-mesa-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev libxi-dev libxxf86vm-dev xorg-dev

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race -count=1 -timeout 5m ./...
        env:
          CGO_ENABLED: '1'

      - name: go build
        run: go build ./cmd/edcolreport
        env:
          CGO_ENABLED: '1'
