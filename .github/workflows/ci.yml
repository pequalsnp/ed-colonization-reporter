name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: go vet
        run: go vet ./...

      # The race detector requires cgo; the release binary is CGO-free.
      - name: go test (race)
        run: go test -race -count=1 -timeout 5m ./...
        env:
          CGO_ENABLED: '1'

      - name: go build (pure-Go release shape)
        run: go build ./...
        env:
          CGO_ENABLED: '0'
